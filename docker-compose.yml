services:
  search:
    build:
      context: ./search
      dockerfile: Dockerfile

    environment:
      MONGO_URL: mongodb://mongo:27017/hotel-app

    depends_on:
      - mongo

    expose:
      - "3001"

    deploy:
      replicas: 1
  bookings:
    build:
      context: ./booking
      dockerfile: Dockerfile

    environment:
      MONGO_URL: mongodb://mongo:27017/hotel-app

    depends_on:
      - mongo

    expose:
      - "3002"

    deploy:
      replicas: 1

  users:
    build:
      context: ./users
      dockerfile: Dockerfile

    environment:
      MONGO_URL: mongodb://mongo:27017/hotel-app

    depends_on:
      - mongo

    expose:
      - "3000"

    deploy:
      replicas: 1

  nginx:
    image: nginx:latest

    ports:
      - "3000:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - search
      - users
      - bookings

  mongo:
    image: mongo:latest
    container_name: hotel-app-mongodb
    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db
      - ./init_hotels.sh:/docker-entrypoint-initdb.d/init_hotels.sh:ro

volumes:
  mongo_data: