events {}

http {
    upstream search {
        server search:3001;
    }
    upstream users {
        server users:3000;
    }

    server {
        listen 80;

        location /api/search/ {
            proxy_pass http://search;
        }
        location /api/users/ {
            proxy_pass http://users;
        }
        location /api/bookings {
            proxy_pass http://users;
        }
    }
}